version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: care-nest-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - care_nest_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: care-nest-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} --no-auth-warning ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build: .
    container_name: home-nursing-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:?}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:?}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?}
      SPRING_REDIS_HOST: ${REDIS_HOST}
      SPRING_REDIS_PORT: ${REDIS_PORT}
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:?}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:?}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:?}
      JWT_SECRET: ${JWT_SECRET:?}
      JWT_ACCESS_TOKEN_TTL_MIN: ${JWT_ACCESS_TOKEN_TTL_MIN:?}
      JWT_REFRESH_TOKEN_TTL_DAYS: ${JWT_REFRESH_TOKEN_TTL_DAYS:?}
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:?}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:?}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:?}
      RATE_LIMIT_PHONE_WINDOW_SECONDS: ${RATE_LIMIT_PHONE_WINDOW_SECONDS:?}
      RATE_LIMIT_PHONE_MAX_REQUESTS: ${RATE_LIMIT_PHONE_MAX_REQUESTS:?}
      RATE_LIMIT_IP_WINDOW_SECONDS: ${RATE_LIMIT_IP_WINDOW_SECONDS:?}
      RATE_LIMIT_IP_MAX_REQUESTS: ${RATE_LIMIT_IP_MAX_REQUESTS:?}
    ports:
      - "8080:8080"
    profiles:
      - full

volumes:
  care_nest_pg_data:
