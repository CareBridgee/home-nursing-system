services:
  mysql:
    image: mysql:8.4
    container_name: home-nursing-db
    environment:
      MYSQL_DATABASE: homenursing
      MYSQL_USER: homenursing
      MYSQL_PASSWORD: homenursing
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - home_nursing_mysql_data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build: .
    container_name: home-nursing-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/homenursing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: homenursing
      SPRING_DATASOURCE_PASSWORD: homenursing
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    ports:
      - "8080:8080"
    profiles:
      - full

volumes:
  home_nursing_mysql_data:
