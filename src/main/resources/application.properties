spring.application.name=care-nest

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:carenest}
spring.datasource.username=${DB_USER:carenest}
spring.datasource.password=${DB_PASSWORD:carenest}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${SPRING_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}

# Twilio
TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:}
TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:}
TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:}

# JWT
JWT_SECRET=${JWT_SECRET:secretKeyForJwtSigningAndValidation1234567890AB}
JWT_ACCESS_TOKEN_TTL_MIN=${JWT_ACCESS_TOKEN_TTL_MIN:15}
JWT_REFRESH_TOKEN_TTL_DAYS=${JWT_REFRESH_TOKEN_TTL_DAYS:30}

# OTP
OTP_TTL_SECONDS=${OTP_TTL_SECONDS:300}
OTP_MAX_ATTEMPTS=${OTP_MAX_ATTEMPTS:3}

# Rate limiting
RATE_LIMIT_PHONE_WINDOW_SECONDS=${RATE_LIMIT_PHONE_WINDOW_SECONDS:600}
RATE_LIMIT_PHONE_MAX_REQUESTS=${RATE_LIMIT_PHONE_MAX_REQUESTS:3}
RATE_LIMIT_IP_WINDOW_SECONDS=${RATE_LIMIT_IP_WINDOW_SECONDS:600}
RATE_LIMIT_IP_MAX_REQUESTS=${RATE_LIMIT_IP_MAX_REQUESTS:10}

# Server
server.port=8080

spring.docker.compose.lifecycle-management=start-and-stop
spring.docker.compose.profiles.active=
